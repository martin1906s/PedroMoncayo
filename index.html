    <link rel="apple-touch-icon" href="/images/Todos los Gatos/Logo/isotipo.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Meta tags básicos -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563EB" />
    
    <!-- SEO Meta Tags -->
    <title>Michi Money - Juego Educativo de Finanzas Personales</title>
    <meta name="description" content="Aprende educación financiera de manera divertida e interactiva. Juego educativo sobre ahorro, inversiones, presupuestos y cómo evitar estafas financieras." />

    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://feria-michi-money.vercel.app/" />
    <meta property="og:title" content="Michi Money - Juego de Finanzas para Gatos" />
    <meta property="og:description" content="¡Conviértete en un experto financiero! Juega, aprende sobre ahorro y gana Michi-monedas." />
    <meta property="og:image" content="/images/Todos%20los%20Gatos/Logo/logo%20vector.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_ES" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://feria-michi-money.vercel.app/" />
    <meta property="twitter:title" content="Michi Money - Juego de Finanzas para Gatos" />
    <meta property="twitter:description" content="Juego educativo sobre finanzas personales y ahorro." />
    <meta property="twitter:image" content="/images/Todos%20los%20Gatos/Logo/logo%20vector.png" />
    
    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Michi Money" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Michi Money" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Preconnect para recursos externos -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload de recursos críticos -->
    <link rel="preload" href="/images/Todos%20los%20Gatos/Logo/logo%20vector.png" as="image" />
    
    <!-- DNS Prefetch para mejorar velocidad -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <!-- Inline critical CSS para evitar FOUC -->
    <style>
      /* Critical CSS */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loading spinner inicial */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        z-index: 9999;
      }
      
      .initial-loader-spinner {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(37, 99, 235, 0.3);
        border-top-color: #2563EB;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loader inicial mientras carga React -->
    <div id="initial-loader" class="initial-loader">
      <div class="initial-loader-spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <!-- Script para ocultar loader cuando React carga -->
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          // Ocultar loader cuando React monte
          const observer = new MutationObserver(() => {
            const root = document.getElementById('root');
            if (root && root.children.length > 0) {
              loader.style.opacity = '0';
              loader.style.transition = 'opacity 0.3s';
              setTimeout(() => loader.remove(), 300);
              observer.disconnect();
            }
          });
          observer.observe(document.getElementById('root'), { childList: true });
        }
      });
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
